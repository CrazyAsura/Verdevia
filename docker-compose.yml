include:
  - path: ./VERDEVIA-WEB-MAIN/docker-compose.yml
  - path: ./VERDEVIA-WEB-ADMIN/docker-compose.yml
  - path: ./VERDEVIA-WEB-CHATBOT/docker-compose.yml

# =============================================================================
# VERDEVIA â€” Distributed Microservices Architecture
# =============================================================================
# Network Topology (zero-trust micro-segmentation):
#
#   verdevia_infra_net    â†’ Shared infrastructure (postgres, redis, kafka, mongodb, ai-gateway)
#   verdevia_mobile_net   â†’ Mobile: mobile-gateway <-> mobile-backend
#   verdevia_web_net      â†’ Web: web-gateway <-> web-backend <-> frontend-main
#   verdevia_admin_net    â†’ Admin: web-gateway <-> admin-backend <-> frontend-admin
#   verdevia_chatbot_net  â†’ Chatbot: chatbot-backend <-> mobile-gateway + web-gateway
#   verdevia_proxy_net    â†’ Edge: nginx <-> all frontends and gateways
# =============================================================================

services:
  # â”€â”€ PostgreSQL (Shared Infrastructure)
  postgres:
    image: postgres:15-alpine
    container_name: verdevia_postgres
    env_file:
      - ./VERDEVIA-MOBILE-BACKEND/.env
    environment:
      POSTGRES_USER: ${DB_USERNAME:-ecoa_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ecoa_password}
      POSTGRES_DB: ${DB_NAME:-ecoa_db}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - verdevia_infra_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USERNAME:-ecoa_user} -d ${DB_NAME:-ecoa_db}"
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_grace_period: 30s

  # â”€â”€ MongoDB (Shared Infrastructure)
  mongodb:
    image: mongo:7-jammy
    container_name: verdevia_mongodb
    env_file:
      - ./VERDEVIA-MOBILE-BACKEND/.env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-ecoa_mongo}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-ecoa_mongo_password}
      MONGO_INITDB_DATABASE: ecoa
    ports:
      - "27017:27017"
    ulimits:
      nproc: 65536
      nofile:
        soft: 65536
        hard: 65536
    pids_limit: -1
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/01-init.js:ro
    networks:
      - verdevia_infra_net
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.adminCommand('ping').ok"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    stop_grace_period: 30s
    command: mongod --auth

  # â”€â”€ Redis (Shared Infrastructure)
  redis:
    image: redis:7-alpine
    container_name: verdevia_redis
    env_file:
      - ./VERDEVIA-MOBILE-BACKEND/.env
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-ecoa_redis_password}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    networks:
      - verdevia_infra_net
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD:-ecoa_redis_password}",
          "ping"
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_grace_period: 15s

  # â”€â”€ Apache Kafka (Shared Infrastructure)
  kafka:
    image: apache/kafka:4.0.0
    container_name: verdevia_kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - verdevia_infra_net
    healthcheck:
      test:
        [
          "CMD",
          "/opt/kafka/bin/kafka-broker-api-versions.sh",
          "--bootstrap-server",
          "localhost:9092"
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    stop_grace_period: 60s

  # â”€â”€ FastAPI AI Gateway (Shared Infrastructure)
  fastapi-ai-gateway:
    build:
      context: ./VERDEVIA-AI-GATEWAY
      dockerfile: Dockerfile
      args:
        - PIP_INDEX_URL=${PIP_INDEX_URL:-https://pypi.org/simple}
        - PIP_TRUSTED_HOST=${PIP_TRUSTED_HOST:-pypi.org files.pythonhosted.org pypi.python.org}
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
    container_name: verdevia_fastapi_ai_gateway
    env_file:
      - ./VERDEVIA-AI-GATEWAY/.env
    restart: unless-stopped
    init: true
    stop_grace_period: 20s
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e4b}
      OLLAMA_FALLBACK_MODEL: ${OLLAMA_FALLBACK_MODEL:-gemma4:e2b}
      AI_GATEWAY_LOG_LEVEL: ${AI_GATEWAY_LOG_LEVEL:-INFO}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - verdevia_infra_net  # accessible by chatbot-backend via this net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================================
  # MOBILE DOMAIN â€” Mobile app, mobile backend, mobile gateway
  # Network: verdevia_mobile_net + verdevia_infra_net
  # ============================================================================

  # â”€â”€ Backend Mobile Svc
  mobile-backend:
    build:
      context: ./VERDEVIA-MOBILE-BACKEND
      dockerfile: Dockerfile
      args:
        - YARN_REGISTRY=${YARN_REGISTRY:-https://registry.npmmirror.com}
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
    container_name: verdevia_mobile_backend
    env_file:
      - ./VERDEVIA-MOBILE-BACKEND/.env
    command: ["yarn", "start:prod"]
    ports:
      - "3334:3334"
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-ecoa_user}
      DB_PASSWORD: ${DB_PASSWORD:-ecoa_password}
      DB_NAME: ${DB_NAME:-ecoa_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-ecoa_redis_password}
      KAFKA_BROKERS: kafka:9094
      KAFKA_CLIENT_ID: verdevia-mobile-backend
      KAFKA_CONSUMER_ENABLED: "true"
      BACKEND_PORT: 3334
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - verdevia_mobile_net  # gateway <-> backend communication
      - verdevia_infra_net   # access to postgres, redis, kafka
    volumes:
      - ./VERDEVIA-MOBILE-BACKEND/database:/app/database
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3334/health', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  # â”€â”€ Mobile API Gateway (GraphQL Federation)
  mobile-gateway:
    build:
      context: ./VERDEVIA-MOBILE-GATEWAY
      dockerfile: Dockerfile
      args:
        - YARN_REGISTRY=${YARN_REGISTRY:-https://registry.npmmirror.com}
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
    container_name: verdevia_mobile_gateway
    env_file:
      - ./VERDEVIA-MOBILE-GATEWAY/.env
    ports:
      - "3333:3333"
    restart: unless-stopped
    init: true
    stop_grace_period: 15s
    command: ["yarn", "start:prod"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      MOBILE_GATEWAY_PORT: 3333
      MOBILE_BACKEND_SUBGRAPH_URL: http://mobile-backend:3334/graphql
      CHATBOT_BACKEND_SUBGRAPH_URL: http://chatbot-backend:3337/graphql
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      JWT_SECRET: ${JWT_SECRET:-}
    depends_on:
      mobile-backend:
        condition: service_healthy
      chatbot-backend:
        condition: service_healthy
    networks:
      - verdevia_mobile_net    # <-> mobile-backend
      - verdevia_chatbot_net   # <-> chatbot-backend
      - verdevia_proxy_net     # <-> nginx edge
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3333/graphql?query=%7B__schema%7BqueryType%7Bname%7D%7D%7D', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ============================================================================
  # WEB DOMAIN â€” Web public frontend + web backend + web gateway
  # Network: verdevia_web_net + verdevia_infra_net
  # ============================================================================

  # â”€â”€ Backend Web Svc
  web-backend:
    build:
      context: ./VERDEVIA-WEB-BACKEND
      dockerfile: Dockerfile
      args:
        - YARN_REGISTRY=${YARN_REGISTRY:-https://registry.npmmirror.com}
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
    container_name: verdevia_web_backend
    env_file:
      - ./VERDEVIA-WEB-BACKEND/.env
    command: ["yarn", "start:prod"]
    ports:
      - "3336:3336"
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-ecoa_user}
      DB_PASSWORD: ${DB_PASSWORD:-ecoa_password}
      DB_NAME: ${DB_NAME:-ecoa_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-ecoa_redis_password}
      MONGODB_URI: mongodb://ecoa_app:ecoa_app_password_dev@mongodb:27017/ecoa
      KAFKA_BROKERS: kafka:9094
      KAFKA_CLIENT_ID: verdevia-web-backend
      KAFKA_CONSUMER_ENABLED: "true"
      BACKEND_PORT: 3336
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - verdevia_web_net   # gateway <-> backend communication
      - verdevia_infra_net # access to postgres, redis, kafka, mongodb
    volumes:
      - ./VERDEVIA-WEB-BACKEND/database:/app/database
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3336/health', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  # ============================================================================
  # ADMIN DOMAIN â€” Administrative panel + admin backend
  # Network: verdevia_admin_net + verdevia_infra_net
  # ============================================================================

  # â”€â”€ Backend Administrative Svc
  admin-backend:
    build:
      context: ./VERDEVIA-ADMIN-BACKEND
      dockerfile: Dockerfile
      args:
        - YARN_REGISTRY=${YARN_REGISTRY:-https://registry.npmmirror.com}
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
    container_name: verdevia_admin_backend
    env_file:
      - ./VERDEVIA-ADMIN-BACKEND/.env
    command: ["yarn", "start:prod"]
    ports:
      - "3338:3338"
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-ecoa_user}
      DB_PASSWORD: ${DB_PASSWORD:-ecoa_password}
      DB_NAME: ${DB_NAME:-ecoa_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-ecoa_redis_password}
      KAFKA_BROKERS: kafka:9094
      KAFKA_CLIENT_ID: verdevia-admin-backend
      KAFKA_CONSUMER_ENABLED: "true"
      BACKEND_PORT: 3338
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - verdevia_admin_net  # gateway <-> admin-backend communication
      - verdevia_infra_net  # access to postgres, redis, kafka
    volumes:
      - ./VERDEVIA-ADMIN-BACKEND/database:/app/database
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3338/health', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  # ============================================================================
  # CHATBOT DOMAIN â€” AI chatbot backend (shared by web and mobile gateways)
  # Network: verdevia_chatbot_net + verdevia_infra_net
  # ============================================================================

  # â”€â”€ Backend Chatbot Svc
  chatbot-backend:
    build:
      context: ./VERDEVIA-CHATBOT-BACKEND
      dockerfile: Dockerfile
      args:
        - YARN_REGISTRY=${YARN_REGISTRY:-https://registry.npmmirror.com}
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
    container_name: verdevia_chatbot_backend
    env_file:
      - ./VERDEVIA-CHATBOT-BACKEND/.env
    command: ["yarn", "start:prod"]
    ports:
      - "3337:3337"
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-ecoa_user}
      DB_PASSWORD: ${DB_PASSWORD:-ecoa_password}
      DB_NAME: ${DB_NAME:-ecoa_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-ecoa_redis_password}
      KAFKA_BROKERS: kafka:9094
      KAFKA_CLIENT_ID: verdevia-chatbot-backend
      KAFKA_CONSUMER_ENABLED: "true"
      BACKEND_PORT: 3337
      AI_GATEWAY_URL: ${AI_GATEWAY_URL:-http://fastapi-ai-gateway:8000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      fastapi-ai-gateway:
        condition: service_healthy
    networks:
      - verdevia_chatbot_net # accessible by both mobile-gateway and web-gateway
      - verdevia_infra_net   # access to postgres, redis, kafka + fastapi-ai-gateway
    volumes:
      - ./VERDEVIA-CHATBOT-BACKEND/database:/app/database
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3337/health', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  # ============================================================================
  # WEB GATEWAY â€” GraphQL Federation for Web + Admin + Chatbot
  # Network: verdevia_web_net + verdevia_admin_net + verdevia_chatbot_net + verdevia_proxy_net
  # ============================================================================

  # â”€â”€ Web API Gateway (GraphQL Federation)
  web-gateway:
    build:
      context: ./VERDEVIA-WEB-GATEWAY
      dockerfile: Dockerfile
      args:
        - YARN_REGISTRY=${YARN_REGISTRY:-https://registry.npmmirror.com}
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
    container_name: verdevia_web_gateway
    env_file:
      - ./VERDEVIA-WEB-GATEWAY/.env
    ports:
      - "3335:3335"
    restart: unless-stopped
    init: true
    stop_grace_period: 15s
    command: ["yarn", "start:prod"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      WEB_GATEWAY_PORT: 3335
      WEB_BACKEND_SUBGRAPH_URL: http://web-backend:3336/graphql
      ADMIN_BACKEND_SUBGRAPH_URL: http://admin-backend:3338/graphql
      CHATBOT_BACKEND_SUBGRAPH_URL: http://chatbot-backend:3337/graphql
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      JWT_SECRET: ${JWT_SECRET:-}
    depends_on:
      web-backend:
        condition: service_healthy
      admin-backend:
        condition: service_healthy
      chatbot-backend:
        condition: service_healthy
    networks:
      - verdevia_web_net      # <-> web-backend
      - verdevia_admin_net    # <-> admin-backend
      - verdevia_chatbot_net  # <-> chatbot-backend
      - verdevia_proxy_net    # <-> nginx edge
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3335/graphql?query=%7B__schema%7BqueryType%7Bname%7D%7D%7D', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ============================================================================
  # ANALYTICS â€” Spark Processor (Admin domain, optional profile)
  # ============================================================================

  spark-processor:
    build:
      context: .
      dockerfile: ./VERDEVIA-ADMIN-BACKEND/src/modules/stats/scripts/spark-processor.Dockerfile
      args:
        - PIP_INDEX_URL=${PIP_INDEX_URL:-https://pypi.org/simple}
        - PIP_TRUSTED_HOST=${PIP_TRUSTED_HOST:-pypi.org files.pythonhosted.org pypi.python.org}
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
    container_name: verdevia_spark_processor
    env_file:
      - ./VERDEVIA-ADMIN-BACKEND/.env
    profiles:
      - analytics
    volumes:
      - ./VERDEVIA-ADMIN-BACKEND/src/modules/stats/scripts:/app/backend/src/modules/stats/scripts:ro
    working_dir: /app
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9094
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ecoa_db
      DB_USERNAME: ecoa_user
      DB_PASSWORD: ecoa_password
    command: python /app/backend/src/modules/stats/scripts/spark_processor.py
    networks:
      - verdevia_infra_net  # access to kafka + postgres only
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    init: true
    stop_grace_period: 30s

  # ============================================================================
  # EDGE â€” Nginx Reverse Proxy & Ngrok Tunnel
  # Network: verdevia_proxy_net only (frontends + gateways)
  # ============================================================================

  # â”€â”€ Nginx Edge Gateway
  nginx:
    image: nginx:alpine
    container_name: verdevia_nginx
    restart: unless-stopped
    init: true
    stop_grace_period: 20s
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./VERDEVIA-WEB/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./VERDEVIA-WEB/nginx/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - verdevia_proxy_net  # only needs to see frontends and gateways

  # â”€â”€ Secure Ngrok Tunnel
  tunnel:
    image: ngrok/ngrok:latest
    container_name: verdevia_tunnel
    env_file:
      - ./VERDEVIA-MOBILE-BACKEND/.env
    restart: unless-stopped
    init: true
    stop_grace_period: 10s
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    command:
      - "http"
      - "https://nginx:443"
      - "--domain=${NGROK_DOMAIN:-}"
      - "--upstream-tls-verify=false"
    networks:
      - verdevia_proxy_net  # only needs to reach nginx

# =============================================================================
# NETWORKS â€” Domain-isolated micro-segmented topology
# =============================================================================
networks:
  # Shared infrastructure: databases, queues, AI gateway
  verdevia_infra_net:
    name: verdevia_infra_net
    driver: bridge

  # Mobile domain: mobile-gateway <-> mobile-backend
  verdevia_mobile_net:
    name: verdevia_mobile_net
    driver: bridge

  # Web public domain: web-gateway <-> web-backend <-> frontend-main
  verdevia_web_net:
    name: verdevia_web_net
    driver: bridge

  # Admin domain: web-gateway <-> admin-backend <-> frontend-admin
  verdevia_admin_net:
    name: verdevia_admin_net
    driver: bridge

  # Chatbot domain: chatbot-backend (shared by mobile + web gateways)
  verdevia_chatbot_net:
    name: verdevia_chatbot_net
    driver: bridge

  # Edge/Proxy domain: nginx, all frontends, all gateways
  verdevia_proxy_net:
    name: verdevia_proxy_net
    driver: bridge

# =============================================================================
