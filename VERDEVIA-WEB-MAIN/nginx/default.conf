# =========================================================================
# ECOÁ - Nginx Gateway Configuration (Web Main Domain)
# =========================================================================

# Upstreams for Next.js Micro-Frontends Static Chunks
upstream nextjs_static_upstream {
    server frontend-main:3000 max_fails=3 fail_timeout=10s;
    server frontend-admin:3000 max_fails=3 fail_timeout=10s;
    server frontend-chatbot:3000 max_fails=3 fail_timeout=10s;
}

# HTTP Server — Redirect all traffic to HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Let Let's Encrypt / ACME challenges pass if needed
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect standard HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server — Reverse Proxy Gateway
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    # SSL Certificates (mounted from root certs directory)
    ssl_certificate /etc/nginx/certs/verdevia.crt;
    ssl_certificate_key /etc/nginx/certs/verdevia.key;

    # SSL Protocol Hardening (Apple Standard/Meta Standard)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    
    # SSL Session Optimization
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Gzip Compression Tuning
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/vnd.geo+json
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/css
        text/plain
        text/vcard
        text/vnd.rim.location.code
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    # Proxy Buffer Tuning for High Performance
    proxy_buffers 16 16k;
    proxy_buffer_size 32k;

    # Standard Proxy Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # Dynamic Resolver to allow startup/restart resilience
    resolver 127.0.0.11 valid=5s;

    # NestJS Backend GraphQL Subscription & Query routing
    location /graphql {
        set $backend_upstream http://web-gateway:3335;
        proxy_pass $backend_upstream;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # NestJS Backend Swagger UI Routing
    location /api/docs {
        set $backend_upstream http://mobile-backend:3334;
        proxy_pass $backend_upstream;
    }

    # Security bootstrap keeps its /api prefix in the NestJS controller.
    location /api/security/ {
        set $backend_upstream http://mobile-backend:3334;
        proxy_pass $backend_upstream;
    }

    # NestJS Backend REST API Routing (with rewrite)
    location /api/ {
        # Strip '/api' from path before sending to NestJS (e.g. /api/users -> /users)
        rewrite ^/api/(.*)$ /$1 break;
        
        set $backend_upstream http://mobile-backend:3334;
        proxy_pass $backend_upstream;
    }

    # Cache Next.js static chunks indefinitely with fallback between frontends
    location /_next/static/ {
        proxy_pass http://nextjs_static_upstream;
        proxy_next_upstream error timeout http_404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Custom caching and compression avoidance for heavy APK/IPA bundles
    location ~* \.(apk|ipa)$ {
        set $frontend_upstream http://frontend-main:3000;
        proxy_pass $frontend_upstream;
        add_header Cache-Control "public, max-age=86400, no-transform";
    }

    # Admin Panel & Admin Operations
    location ~ ^/(painel|administrador|prestadores|super-administrador|super-prestadores|superadmin) {
        set $admin_upstream http://frontend-admin:3000;
        proxy_pass $admin_upstream;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Chatbot full-screen app / Triagem
    location ~ ^/(chatbot|chat) {
        set $chatbot_upstream http://frontend-chatbot:3000;
        proxy_pass $chatbot_upstream;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Next.js Frontend Routing (catch-all for Web Main)
    location / {
        set $frontend_upstream http://frontend-main:3000;
        proxy_pass $frontend_upstream;
        
        # Dev server WebSocket / HMR support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
