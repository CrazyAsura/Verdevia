services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
        - NEXT_PUBLIC_GRAPHQL_URL=${NEXT_PUBLIC_GRAPHQL_URL:-/graphql}
        - YARN_REGISTRY=${YARN_REGISTRY:-https://registry.npmmirror.com}
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
    container_name: verdevia_frontend
    env_file:
      - .env
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
      - NEXT_PUBLIC_GRAPHQL_URL=${NEXT_PUBLIC_GRAPHQL_URL:-/graphql}
      # Next.js SSR rewrites run server-side inside the container.
      # 127.0.0.1 resolves to the frontend container itself — use the Docker service name instead.
      - BACKEND_INTERNAL_URL=http://backend:3333
    networks:
      - verdevia_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  verdevia_network:
    name: verdevia_network
    external: true
