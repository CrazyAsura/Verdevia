version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: verdevia_user
      POSTGRES_PASSWORD: verdevia_password
      POSTGRES_DB: verdevia_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_infra_data:/var/lib/postgresql/data
    networks:
      - VERDEVIA_infra_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verdevia_user -d verdevia_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --requirepass verdevia_redis_password
    ports:
      - "6379:6379"
    volumes:
      - redis_infra_data:/data
    networks:
      - VERDEVIA_infra_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "verdevia_redis_password", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka:
    image: apache/kafka:4.0.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafka_infra_data:/var/lib/kafka/data
    networks:
      - VERDEVIA_infra_net
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  mongodb:
    image: mongo:7-jammy
    container_name: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: verdevia_app
      MONGO_INITDB_ROOT_PASSWORD: verdevia_app_password_dev
      MONGO_INITDB_DATABASE: verdevia
    ports:
      - "27017:27017"
    volumes:
      - mongodb_infra_data:/data/db
      - mongodb_infra_config:/data/configdb
    networks:
      - VERDEVIA_infra_net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

networks:
  VERDEVIA_infra_net:
    name: VERDEVIA_infra_net
    external: true

volumes:
  postgres_infra_data:
  redis_infra_data:
  kafka_infra_data:
  mongodb_infra_data:
  mongodb_infra_config:
