name: 🛡️ Antigravity Backend CD

on:
  push:
    branches: [ main, master ]
    paths:
      - 'ECOA-BACKEND/**'
  workflow_dispatch:

jobs:
  quality-gate:
    name: 🧪 Quality & Security Gate
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ECOA-BACKEND/package-lock.json

      - name: 📦 Install Dependencies
        working-directory: ./ECOA-BACKEND
        run: npm install

      - name: ⬢ Lint Check
        working-directory: ./ECOA-BACKEND
        run: npm run lint

      - name: 🧪 Unit Tests
        working-directory: ./ECOA-BACKEND
        run: npm run test

      - name: 🏗️ Production Build
        working-directory: ./ECOA-BACKEND
        run: npm run build

  deploy:
    name: 🚀 Deploy to Production (Render CLI)
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Install Render CLI
        run: |
          curl -f https://render.com/install.sh | sh
          echo "$HOME/.render/bin" >> $GITHUB_PATH

      - name: 🚀 Trigger Render Deploy
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          # O SERVICE_ID deve ser configurado como um segredo no GitHub
          # ou podemos tentar obter dinamicamente se o CLI permitir
          render deploys create ${{ secrets.RENDER_SERVICE_ID }} --wait

  docker-push:
    name: 🐳 Docker Build & Push (Fallback)
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔐 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏷️ Set Lowercase Owner
        id: owner
        run: |
          echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: 📦 Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./ECOA-BACKEND
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/ecoa-backend:latest
            ghcr.io/${{ steps.owner.outputs.owner }}/ecoa-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
