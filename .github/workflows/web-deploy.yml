name: 🌐 Antigravity Web CD

on:
  push:
    branches: [ main, master ]
    paths:
      - 'ECOA-WEB/**'
  workflow_dispatch:

jobs:
  quality-gate:
    name: 🧪 UI/UX Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ECOA-WEB/package-lock.json

      - name: 📦 Install Dependencies
        working-directory: ./ECOA-WEB
        run: npm install

      - name: ⬢ Lint Check
        working-directory: ./ECOA-WEB
        run: npm run lint

      - name: 🏗️ Production Build
        working-directory: ./ECOA-WEB
        run: npm run build

  deploy:
    name: 🚀 Deploy to Production (Vercel)
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install Vercel CLI
        run: npm install --global vercel

      - name: 🚀 Pull Vercel Environment Information
        working-directory: ./ECOA-WEB
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🏗️ Build Project Artifacts
        working-directory: ./ECOA-WEB
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🚀 Deploy Project Artifacts to Vercel
        working-directory: ./ECOA-WEB
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  docker-push:
    name: 🐳 Docker Build & Push (Fallback)
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔐 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏷️ Set Lowercase Owner
        id: owner
        run: |
          echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: 📦 Build and Push Web Image
        uses: docker/build-push-action@v5
        with:
          context: ./ECOA-WEB
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/ecoa-web:latest
            ghcr.io/${{ steps.owner.outputs.owner }}/ecoa-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
