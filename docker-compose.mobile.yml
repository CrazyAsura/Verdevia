services:
  mobile-web:
    image: node:20-slim
    container_name: verdevia_mobile_web
    working_dir: /app
    environment:
      CI: "0"
      EXPO_NO_TELEMETRY: "1"
      HOST: 0.0.0.0
      WDS_SOCKET_HOST: localhost
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      REACT_NATIVE_PACKAGER_HOSTNAME: localhost
      EXPO_PUBLIC_API_URL: http://localhost:3333
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
      - "19006:19006"
    volumes:
      - ./VERDEVIA-MOBILE:/app
      - mobile_node_modules:/app/node_modules
      - mobile_npm_cache:/root/.npm
    command: >
      sh -lc "
        if [ ! -d node_modules/expo ]; then
          npm ci --legacy-peer-deps;
        fi;
        npx expo start --web --port 8081 --lan --clear
      "

volumes:
  mobile_node_modules:
  mobile_npm_cache:
