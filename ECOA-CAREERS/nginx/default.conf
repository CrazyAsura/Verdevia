# =========================================================================
# ECOÁ - Nginx Gateway Configuration (Careers Domain)
# =========================================================================

# Upstreams for Next.js Careers Frontend Static Chunks
upstream careers_static_upstream {
    server frontend-careers:3000 max_fails=3 fail_timeout=10s;
    server frontend-careers-admin:3000 max_fails=3 fail_timeout=10s;
}

# HTTP Server — Redirect all traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name _;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server — Reverse Proxy Gateway
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    # SSL Certificates (mounted from root certs directory)
    ssl_certificate /etc/nginx/certs/ecoa.crt;
    ssl_certificate_key /etc/nginx/certs/ecoa.key;

    # SSL Protocol Hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    
    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Proxy Buffer Tuning
    proxy_buffers 16 16k;
    proxy_buffer_size 32k;

    # Standard Proxy Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Dynamic Resolver to allow startup resilience
    resolver 127.0.0.11 valid=5s;

    # NestJS Backend GraphQL routing (points to the central web-gateway)
    location /graphql {
        set $backend_upstream http://web-gateway:3335;
        proxy_pass $backend_upstream;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Careers Admin Backend REST API Routing (with rewrite)
    location /api/ {
        # Strip '/api' from path before sending to NestJS (e.g. /api/users -> /users)
        rewrite ^/api/(.*)$ /$1 break;
        
        set $backend_upstream http://backend-careers-admin:3339;
        proxy_pass $backend_upstream;
    }

    # Next.js static chunks
    location /_next/static/ {
        proxy_pass http://careers_static_upstream;
        proxy_next_upstream error timeout http_404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Careers Admin panel
    location ~ ^/(admin|painel|careers-admin) {
        set $admin_upstream http://frontend-careers-admin:3000;
        proxy_pass $admin_upstream;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Careers Public Portal (catch-all)
    location / {
        set $frontend_upstream http://frontend-careers:3000;
        proxy_pass $frontend_upstream;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
