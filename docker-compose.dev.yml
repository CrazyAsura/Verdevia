services:
  mobile-backend:
    build:
      context: ./VERDEVIA-MOBILE-BACKEND
      dockerfile: Dockerfile.dev
      args:
        - YARN_REGISTRY=${YARN_REGISTRY:-https://registry.npmmirror.com}
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
    env_file:
      - ./VERDEVIA-MOBILE-BACKEND/.env
    command: ["yarn", "nest", "start", "--watch"]
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=false
      - WATCHPACK_POLLING=false
      - KAFKA_ENABLED=${KAFKA_ENABLED:-false}
      - KAFKA_CONSUMER_ENABLED=${KAFKA_CONSUMER_ENABLED:-false}
      - MONGODB_ENABLED=false
      - BACKEND_PORT=3334
    develop:
      watch:
        - action: sync
          path: ./VERDEVIA-MOBILE-BACKEND
          target: /app
          initial_sync: true
          ignore:
            - node_modules/
            - dist/
            - database/
            - coverage/
            - .git/
            - .dockerignore
            - Dockerfile
            - Dockerfile.dev
            - package.json
            - package-lock.json

  web-backend:
