# VERDEVIA Careers edge proxy

# Keep WebSocket upgrades correct without forcing "upgrade" on normal requests.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Both Next.js applications publish assets below /_next. The referer identifies
# which application generated the page and prevents chunks from being served by
# a random frontend.
map $http_referer $nextjs_assets_upstream {
    ~*/(painel|careers-admin)(/|$) http://frontend-careers-admin:3000;
    default                         http://frontend-careers:3000;
}

server {
    # Port 8083 remains usable in local environments; TLS is exposed on 8443.
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate /etc/nginx/certs/verdevia.crt;
    ssl_certificate_key /etc/nginx/certs/verdevia.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:VERDEVIA_CAREERS_SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 10m;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types application/javascript application/json application/manifest+json application/xml image/svg+xml text/css text/plain text/x-component;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_connect_timeout 10s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    # Public GraphQL facade. This must pass through the public Next.js route,
    # which only permits GetJobs and ApplyForJob operations.
    location = /api/careers/graphql {
        proxy_pass http://frontend-careers:3000;
        proxy_cache_bypass 1;
    }

    # Internal/public backend endpoint for diagnostics and service-to-service use.
    # Browser traffic should normally use /api/careers/graphql above.
    location = /careers/graphql {
        proxy_pass http://backend-careers:3340/graphql;
    }

    # Administrative GraphQL endpoint, including subscription upgrades.
    location = /graphql {
        proxy_pass http://backend-careers-admin:3339/graphql;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Other administrative REST endpoints keep the historical /api stripping.
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend-careers-admin:3339;
    }

    # Route Next.js build assets according to the application that owns the page.
    # If the referer is absent, public Careers is the safe default.
    location /_next/ {
        proxy_pass $nextjs_assets_upstream;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # The admin application owns /painel. /careers-admin is retained as an alias.
    location ^~ /painel {
        proxy_pass http://frontend-careers-admin:3000;
    }

    location ^~ /careers-admin {
        rewrite ^/careers-admin/?(.*)$ /painel/$1 break;
        proxy_pass http://frontend-careers-admin:3000;
    }

    # Public Careers portal and all of its App Router pages.
    location / {
        proxy_pass http://frontend-careers:3000;
    }
}
