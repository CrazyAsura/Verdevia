# =============================================================================
# VERDEVIA - Careers Domain Compose (Independent Repository Setup)
# =============================================================================

services:
  # Public Careers API. Exposes only active jobs and public applications.
  backend-careers:
    build:
      context: ./VERDEVIA-BACKEND-CAREERS
      dockerfile: Dockerfile
      args:
        - YARN_REGISTRY=${YARN_REGISTRY:-https://registry.npmmirror.com}
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
    container_name: VERDEVIA_backend_careers
    env_file:
      - path: ./VERDEVIA-BACKEND-CAREERS/.env
        required: false
    command: ["yarn", "start:prod"]
    ports:
      - "3340:3340"
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3340
      BACKEND_PORT: 3340
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-verdevia_user}
      DB_PASSWORD: ${DB_PASSWORD:-verdevia_password}
      DB_NAME: ${DB_NAME:-verdevia_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-verdevia_redis_password}
    networks:
      - VERDEVIA_infra_net
      - VERDEVIA_web_net

  # ── Backend Careers Admin Svc
  backend-careers-admin:
    build:
      context: ./VERDEVIA-BACKEND-CAREERS-ADMIN
      dockerfile: Dockerfile
      args:
        - YARN_REGISTRY=${YARN_REGISTRY:-https://registry.npmmirror.com}
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
    container_name: VERDEVIA_backend_careers_admin
    env_file:
      - path: ./VERDEVIA-BACKEND-CAREERS-ADMIN/.env
        required: false
    command: ["yarn", "start:prod"]
    ports:
      - "3339:3339"
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-verdevia_user}
      DB_PASSWORD: ${DB_PASSWORD:-verdevia_password}
      DB_NAME: ${DB_NAME:-verdevia_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-verdevia_redis_password}
      PORT: 3339
      BACKEND_PORT: 3339
    networks:
      - VERDEVIA_infra_net
      - VERDEVIA_web_net

  # ── Frontend Careers (Next.js Careers Portal)
  frontend-careers:
    build:
      context: ./VERDEVIA-WEB-CAREERS
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
        - NEXT_PUBLIC_GRAPHQL_URL=${NEXT_PUBLIC_GRAPHQL_URL:-/api/careers/graphql}
        - YARN_REGISTRY=${YARN_REGISTRY:-https://registry.npmmirror.com}
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
    container_name: VERDEVIA_frontend_careers
    env_file:
      - path: ./VERDEVIA-WEB-CAREERS/.env
        required: false
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
      - NEXT_PUBLIC_GRAPHQL_URL=${NEXT_PUBLIC_GRAPHQL_URL:-/api/careers/graphql}
      - CAREERS_GRAPHQL_URL=${CAREERS_GRAPHQL_URL:-http://backend-careers:3340/graphql}
    depends_on:
      - backend-careers
    ports:
      - "3003:3000"
    networks:
      - VERDEVIA_proxy_net
      - VERDEVIA_web_net

  # ── Frontend Careers Admin (Next.js Careers Admin Panel)
  frontend-careers-admin:
    build:
      context: ./VERDEVIA-WEB-CAREERS-ADMIN
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
        - NEXT_PUBLIC_GRAPHQL_URL=${NEXT_PUBLIC_GRAPHQL_URL:-/api/careers/graphql}
        - YARN_REGISTRY=${YARN_REGISTRY:-https://registry.npmmirror.com}
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
    container_name: VERDEVIA_frontend_careers_admin
    env_file:
      - path: ./VERDEVIA-WEB-CAREERS-ADMIN/.env
        required: false
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
      - NEXT_PUBLIC_GRAPHQL_URL=${NEXT_PUBLIC_GRAPHQL_URL:-/api/careers/graphql}
      - CAREERS_ADMIN_GRAPHQL_URL=${CAREERS_ADMIN_GRAPHQL_URL:-http://backend-careers-admin:3339/graphql}
    ports:
      - "3004:3000"
    networks:
      - VERDEVIA_proxy_net
      - VERDEVIA_web_net

  # ── Nginx Edge Proxy
  nginx:
    image: nginx:alpine
    container_name: VERDEVIA_nginx_careers
    ports:
      - "8083:80"
      - "8443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../certs:/etc/nginx/certs:ro
    restart: unless-stopped
    networks:
      - VERDEVIA_proxy_net
      - VERDEVIA_web_net
      - VERDEVIA_infra_net

# =============================================================================
# NETWORKS - Redes externas gerenciadas pela infraestrutura comum
# =============================================================================
networks:
  VERDEVIA_infra_net:
    name: VERDEVIA_infra_net
    external: true
  VERDEVIA_web_net:
    name: VERDEVIA_web_net
    external: true
  VERDEVIA_proxy_net:
    name: VERDEVIA_proxy_net
    external: true
