services:
  # ── PostgreSQL (Primary — TypeORM: Users, Complaints, Courses, etc.)
  postgres:
    image: postgres:15-alpine
    container_name: verdevia_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USERNAME:-ecoa_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ecoa_password}
      POSTGRES_DB: ${DB_NAME:-ecoa_db}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - verdevia_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USERNAME:-ecoa_user} -d ${DB_NAME:-ecoa_db}"
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_grace_period: 30s

  # ── MongoDB (Forum: posts & comments — Mongoose)
  mongodb:
    image: mongo:7-jammy
    container_name: verdevia_mongodb
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-ecoa_mongo}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-ecoa_mongo_password}
      MONGO_INITDB_DATABASE: ecoa
    ports:
      - "27017:27017"
    ulimits:
      nproc: 65536
      nofile:
        soft: 65536
        hard: 65536
    pids_limit: -1
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ../scripts/mongo-init.js:/docker-entrypoint-initdb.d/01-init.js:ro
    networks:
      - verdevia_network
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.adminCommand('ping').ok"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    stop_grace_period: 30s
    command: mongod --auth

  # ── Redis (Cache + JWT Blacklist)
  redis:
    image: redis:7-alpine
    container_name: verdevia_redis
    env_file:
      - .env
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-ecoa_redis_password}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    networks:
      - verdevia_network
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD:-ecoa_redis_password}",
          "ping"
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_grace_period: 15s

  # ── Apache Kafka (KRaft Mode — no Zookeeper)
  kafka:
    image: apache/kafka:4.0.0
    container_name: verdevia_kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - verdevia_network
    healthcheck:
      test:
        [
          "CMD",
          "/opt/kafka/bin/kafka-broker-api-versions.sh",
          "--bootstrap-server",
          "localhost:9092"
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    stop_grace_period: 60s

  # ── NestJS Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - YARN_REGISTRY=${YARN_REGISTRY:-https://registry.npmmirror.com}
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
    container_name: verdevia_backend
    env_file:
      - .env
    ports:
      - "3333:3333"
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    environment:
      NODE_ENV: ${NODE_ENV:-production}

      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-ecoa_user}
      DB_PASSWORD: ${DB_PASSWORD:-ecoa_password}
      DB_NAME: ${DB_NAME:-ecoa_db}

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-ecoa_redis_password}
      REDIS_PASSWORD_PRIMARY: ${REDIS_PASSWORD_PRIMARY:-ecoa_redis_password}

      MONGODB_URI: mongodb://ecoa_app:ecoa_app_password_dev@mongodb:27017/ecoa

      KAFKA_BROKERS: kafka:9094
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:-antigravity-backend}
      KAFKA_CONSUMER_ENABLED: ${KAFKA_CONSUMER_ENABLED:-true}

      PORT: ${PORT:-3333}
      AI_GATEWAY_URL: ${AI_GATEWAY_URL:-http://fastapi-ai-gateway:8000}
      AI_GATEWAY_TIMEOUT_MS: ${AI_GATEWAY_TIMEOUT_MS:-120000}

      JWT_SECRET: ${JWT_SECRET:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - verdevia_network
    volumes:
      - ./database:/app/database
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3333/health', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  # ── Spark Processor
  spark-processor:
    build:
      context: ..
      dockerfile: scripts/spark-processor.Dockerfile
      args:
        - PIP_INDEX_URL=${PIP_INDEX_URL:-https://pypi.org/simple}
        - PIP_TRUSTED_HOST=${PIP_TRUSTED_HOST:-pypi.org files.pythonhosted.org pypi.python.org}
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
    container_name: verdevia_spark_processor
    env_file:
      - .env
    profiles:
      - analytics
    volumes:
      - ./src/modules/stats/scripts:/app/backend/src/modules/stats/scripts:ro
    working_dir: /app
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9094
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ecoa_db
      DB_USERNAME: ecoa_user
      DB_PASSWORD: ecoa_password
    command: python /app/backend/src/modules/stats/scripts/spark_processor.py
    networks:
      - verdevia_network
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    init: true
    stop_grace_period: 30s

networks:
  verdevia_network:
    name: verdevia_network
    external: true

volumes:
  postgres_data:
    driver: local

  mongodb_data:
    driver: local

  mongodb_config:
    driver: local

  redis_data:
    driver: local

  kafka_data:
    driver: local
