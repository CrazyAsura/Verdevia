# =========================================================================
# ECOÁ - Nginx Gateway Configuration (Chatbot Domain)
# =========================================================================

# HTTP Server — Redirect all traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name _;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server — Reverse Proxy Gateway
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    # SSL Certificates (mounted from root certs directory)
    ssl_certificate /etc/nginx/certs/verdevia.crt;
    ssl_certificate_key /etc/nginx/certs/verdevia.key;

    # SSL Protocol Hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    
    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Proxy Buffer Tuning
    proxy_buffers 16 16k;
    proxy_buffer_size 32k;

    # Standard Proxy Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Dynamic Resolver to allow startup resilience
    resolver 127.0.0.11 valid=5s;

    # NestJS Chatbot Backend GraphQL Routing
    location /graphql {
        set $backend_upstream http://chatbot-backend:3337;
        proxy_pass $backend_upstream;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # NestJS Chatbot Backend REST API Routing (with rewrite)
    location /api/ {
        # Strip '/api' from path before sending to NestJS (e.g. /api/users -> /users)
        rewrite ^/api/(.*)$ /$1 break;
        
        set $backend_upstream http://chatbot-backend:3337;
        proxy_pass $backend_upstream;
    }

    # Next.js Static Chunks
    location /_next/static/ {
        set $frontend_upstream http://frontend-chatbot:3000;
        proxy_pass $frontend_upstream;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Chatbot Next.js Frontend Routing (catch-all)
    location / {
        set $frontend_upstream http://frontend-chatbot:3000;
        proxy_pass $frontend_upstream;
        
        # Dev server WebSocket / HMR support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
