# =============================================================================
# ECOA - Web Backend Isolated Svc
# =============================================================================

services:
  web-backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - YARN_REGISTRY=${YARN_REGISTRY:-https://registry.npmmirror.com}
    container_name: ECOA_web_backend
    env_file:
      - path: .env
        required: false
    command: ["yarn", "start:prod"]
    ports:
      - "3336:3336"
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-ecoa_user}
      DB_PASSWORD: ${DB_PASSWORD:-ecoa_password}
      DB_NAME: ${DB_NAME:-ecoa_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-ecoa_redis_password}
      MONGODB_URI: mongodb://ecoa_app:ecoa_app_password_dev@mongodb:27017/ecoa
      KAFKA_BROKERS: kafka:9094
      KAFKA_CLIENT_ID: ECOA-web-backend
      KAFKA_CONSUMER_ENABLED: "true"
      BACKEND_PORT: 3336
    networks:
      - ECOA_web_net
      - ECOA_infra_net
    volumes:
      - ./database:/app/database

networks:
  ECOA_infra_net:
    name: ECOA_infra_net
    external: true
  ECOA_web_net:
    name: ECOA_web_net
    external: true
